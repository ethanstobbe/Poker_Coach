<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Profile — Poker Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="js/app.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --accent:#c9a84c; --accent2:#f0d080;
  --bg:#070b0d; --card:#141822;
  --border:#2e3350; --text:#e8e8f0; --muted:#8891b0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Rajdhani',sans-serif;
  background:radial-gradient(circle at center,#0d1f15 0%,#050708 100%);
  min-height:100vh; padding:44px 20px 30px; color:var(--text);
}
body::before{
  content:""; position:fixed; inset:0; z-index:-1;
  background:
    radial-gradient(circle at 20% 30%,rgba(201,168,76,0.15),transparent 40%),
    radial-gradient(circle at 80% 70%,rgba(0,255,150,0.08),transparent 40%);
}

/* TOP NAV */
.top-nav{
  position:fixed; top:0; left:0; right:0; height:44px; z-index:100;
  background:linear-gradient(180deg,#1a0e04,#0e0800);
  border-bottom:1px solid rgba(201,168,76,0.25);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px;
}
.nav-title{
  font-family:'Bebas Neue'; font-size:15px; letter-spacing:4px;
  color:var(--accent); text-shadow:0 0 10px rgba(201,168,76,0.4);
}
.nav-btns{display:flex;gap:8px;}
.nav-btn{
  font-family:'Rajdhani'; font-size:11px; font-weight:700;
  letter-spacing:1px; text-transform:uppercase;
  padding:5px 14px; border-radius:4px; cursor:pointer;
  border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.05); color:#ccc;
  transition:all .15s;
}
.nav-btn:hover{background:rgba(201,168,76,0.15);border-color:var(--accent);color:var(--accent2);}

/* LOADER */
#loader{
  display:none; position:fixed; top:54px; left:50%; transform:translateX(-50%);
  z-index:200; background:rgba(0,0,0,0.82); border:1px solid rgba(255,255,255,0.1);
  border-radius:999px; padding:7px 18px;
  color:rgba(255,255,255,0.85); font-size:11px; letter-spacing:1.5px; text-transform:uppercase;
}
#toast{
  display:none; position:fixed; top:54px; left:50%; transform:translateX(-50%);
  z-index:201; padding:9px 20px; border-radius:8px;
  font-family:'Rajdhani'; font-size:13px; font-weight:700; letter-spacing:.5px;
  white-space:nowrap; pointer-events:none;
}
.toast-error  {background:#5a1010;border:1px solid #cc2222;color:#ffaaaa;}
.toast-success{background:#0e3a1a;border:1px solid #2d8a3a;color:#90ffaa;}

/* WRAPPER */
.profile-wrapper{max-width:880px;margin:auto;display:flex;flex-direction:column;gap:20px;}

/* ── HEADER CARD ── */
.profile-header{
  display:flex; align-items:center; gap:24px;
  background:rgba(14,18,28,0.92);
  border:1px solid rgba(201,168,76,0.25); border-radius:18px;
  padding:28px 32px;
  backdrop-filter:blur(10px);
  box-shadow:0 0 40px rgba(0,0,0,0.7),0 0 20px rgba(201,168,76,0.06);
  position:relative; overflow:hidden;
}
.profile-header::before{
  content:''; position:absolute; top:-40px; right:-40px;
  width:220px; height:220px; border-radius:50%;
  background:radial-gradient(circle,rgba(201,168,76,0.08),transparent 70%);
  pointer-events:none;
}
.profile-avatar{
  width:84px; height:84px; border-radius:50%; flex-shrink:0;
  background:radial-gradient(circle at 35% 30%,#2a3f2a,#0d1a10);
  border:2px solid var(--accent);
  display:flex; align-items:center; justify-content:center;
  font-size:38px;
  box-shadow:0 0 22px rgba(201,168,76,0.4);
}
.profile-info{flex:1;}
.profile-username{
  font-family:'Bebas Neue'; font-size:42px; letter-spacing:4px;
  line-height:1; text-shadow:0 2px 8px rgba(0,0,0,0.7);
}
.rank-badge{
  display:inline-block; margin-top:6px; margin-bottom:10px;
  font-size:11px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
  padding:4px 14px; border-radius:20px; border:1px solid;
}
.rank-badge.Bronze   {color:#cd7f32;border-color:#cd7f32;background:rgba(205,127,50,0.12);}
.rank-badge.Silver   {color:#c0c0c0;border-color:#c0c0c0;background:rgba(192,192,192,0.10);}
.rank-badge.Gold     {color:#ffd700;border-color:#ffd700;background:rgba(255,215,0,0.12);}
.rank-badge.Platinum {color:#a0d8ef;border-color:#a0d8ef;background:rgba(160,216,239,0.12);}
.rank-badge.Diamond  {color:#b9f2ff;border-color:#b9f2ff;background:rgba(185,242,255,0.16);}
.rank-badge.Copper   {color:#d08b5b;border-color:#d08b5b;background:rgba(208,139,91,0.12);}
.rank-badge.Legend   {color:#ff66cc;border-color:#ff66cc;background:rgba(255,102,204,0.14);}
.rank-badge.Unranked {color:#888;border-color:#555;background:rgba(100,100,100,0.10);}

/* XP bar */
.xp-row{display:flex;align-items:center;gap:10px;}
.xp-bar-wrap{
  flex:1; height:8px;
  background:rgba(255,255,255,0.06); border-radius:20px; overflow:hidden;
}
#xpFill{
  height:100%;
  background:linear-gradient(90deg,#c9a84c,#f0d080);
  box-shadow:0 0 10px rgba(201,168,76,0.7);
  width:0%; transition:width 0.8s cubic-bezier(.22,1,.36,1);
}
.xp-label{font-size:11px;color:var(--muted);white-space:nowrap;}

/* right side header stats */
.header-stats{
  display:flex; flex-direction:column; gap:8px; align-items:flex-end;
  flex-shrink:0;
}
.header-stat{text-align:right;}
.header-stat-val{font-family:'Bebas Neue';font-size:28px;letter-spacing:2px;color:var(--accent2);}
.header-stat-key{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}

/* ── STATS GRID ── */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
.stat-card{
  background:rgba(14,18,28,0.88);
  border:1px solid var(--border); border-radius:14px;
  padding:20px 18px;
  transition:all .22s;
  box-shadow:0 0 14px rgba(0,0,0,0.5);
  position:relative; overflow:hidden;
}
.stat-card:hover{
  transform:translateY(-4px);
  border-color:rgba(201,168,76,0.4);
  box-shadow:0 0 22px rgba(201,168,76,0.18);
}
.stat-card::after{
  content:''; position:absolute; bottom:0; left:0; right:0; height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  opacity:0; transition:opacity .22s;
}
.stat-card:hover::after{opacity:1;}
.stat-icon{font-size:22px;margin-bottom:8px;}
.stat-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.stat-value{font-family:'Bebas Neue';font-size:38px;letter-spacing:1px;line-height:1;}
.stat-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.c-gold  {color:var(--accent2);}
.c-green {color:#81c784;}
.c-blue  {color:#64b5f6;}
.c-pink  {color:#f48fb1;}

/* ── GRAPH ── */
.graph-card{
  background:rgba(14,18,28,0.88);
  border:1px solid var(--border); border-radius:16px;
  padding:26px 28px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}
.graph-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;}
.graph-title{font-family:'Bebas Neue';font-size:20px;letter-spacing:2px;color:var(--accent2);}
.graph-subtitle{font-size:11px;color:var(--muted);margin-top:2px;letter-spacing:1px;text-transform:uppercase;}
.graph-controls{
  display:flex;
  align-items:center;
  gap:8px;
}
.graph-controls label{
  font-size:10px;
  color:var(--muted);
  letter-spacing:1px;
  text-transform:uppercase;
}
.graph-select{
  background:rgba(255,255,255,0.05);
  color:var(--text);
  border:1px solid var(--border);
  border-radius:8px;
  padding:6px 10px;
  font-family:'Rajdhani',sans-serif;
  font-size:12px;
  font-weight:700;
}
.graph-wrap{height:200px;position:relative;}

/* ── RECENT ACTIVITY ── */
.section-title{
  font-family:'Bebas Neue'; font-size:16px; letter-spacing:3px;
  color:var(--muted); text-transform:uppercase;
  margin-bottom:10px; padding-left:2px;
}
.activity-card{
  background:rgba(14,18,28,0.88);
  border:1px solid var(--border); border-radius:14px;
  overflow:hidden;
  box-shadow:0 0 14px rgba(0,0,0,0.5);
}
.activity-row{
  display:grid; grid-template-columns:1fr 80px 80px 100px;
  padding:12px 20px; align-items:center;
  border-bottom:1px solid rgba(255,255,255,0.04);
  font-size:12px; transition:background .15s;
}
.activity-row:last-child{border-bottom:none;}
.activity-row:hover{background:rgba(255,255,255,0.03);}
.activity-row.header-row{
  font-size:9px; letter-spacing:2px; text-transform:uppercase;
  color:var(--muted); background:rgba(255,255,255,0.02);
}
.tag{
  display:inline-block; padding:2px 8px; border-radius:10px;
  font-size:10px; font-weight:700; letter-spacing:1px;
}
.tag-win {background:rgba(30,120,30,0.25);color:#88ff88;border:1px solid #228822;}
.tag-lose{background:rgba(120,30,30,0.25);color:#ff8888;border:1px solid #882222;}

/* ── BUTTONS ── */
.btn-row{display:flex;gap:12px;}
.back-btn{
  flex:1; padding:13px; border-radius:10px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.05); color:var(--text);
  font-family:'Rajdhani'; font-weight:700; font-size:13px; letter-spacing:2px;
  cursor:pointer; transition:.2s; text-transform:uppercase;
}
.back-btn:hover{background:var(--accent);color:#111;box-shadow:0 8px 25px rgba(201,168,76,0.4);}
.back-btn.lb{background:rgba(201,168,76,0.06);border-color:rgba(201,168,76,0.3);color:var(--accent2);}
.back-btn.lb:hover{background:rgba(201,168,76,0.2);}

/* empty state */
.empty-state{
  text-align:center; padding:28px 20px;
  color:var(--muted); font-size:12px; letter-spacing:1px;
}
</style>
</head>
<body>

<div id="loader">Loading…</div>
<div id="toast" class="toast"></div>

<!-- TOP NAV -->
<nav class="top-nav">
  <div class="nav-title">Poker Trainer</div>
  <div class="nav-btns">
    <button class="nav-btn" onclick="window.location.href='menu.html'">← Menu</button>
    <button class="nav-btn" onclick="window.location.href='leaderboards.html'">🏆 Leaderboard</button>
    <button class="nav-btn" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="profile-wrapper">

  <!-- HEADER -->
  <div class="profile-header">
    <div class="profile-avatar" id="avatarEl">
      <img id="profileAvatarImg" src="" alt="Profile Avatar" style="width:100%;height:100%;object-fit:cover;border-radius:50%;display:none;">
      <span id="avatarFallback">🎯</span>
    </div>
    <div class="profile-info">
      <div class="profile-username" id="username">—</div>
      <div class="rank-badge Unranked" id="rankBadge">Unranked</div>
      <div class="xp-row">
        <div class="xp-bar-wrap"><div id="xpFill"></div></div>
        <div class="xp-label" id="xpText">0 XP</div>
      </div>
    </div>
    <div class="header-stats">
      <div class="header-stat">
        <div class="header-stat-val" id="hstat-earnings">0</div>
        <div class="header-stat-key">Lifetime BB Won</div>
      </div>
      <div class="header-stat">
        <div class="header-stat-val" id="hstat-winrate">0%</div>
        <div class="header-stat-key">Win Rate</div>
      </div>
    </div>
  </div>

  <!-- STATS GRID -->
  <div class="stat-grid">
    <div class="stat-card">
      <div class="stat-icon">🃏</div>
      <div class="stat-label">Hands Played</div>
      <div class="stat-value c-gold" id="stat-played">0</div>
      <div class="stat-sub">Total scenarios</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">✅</div>
      <div class="stat-label">Hands Won</div>
      <div class="stat-value c-green" id="stat-won">0</div>
      <div class="stat-sub">Correct decisions</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">📈</div>
      <div class="stat-label">Win Rate</div>
      <div class="stat-value c-blue" id="stat-winrate">0%</div>
      <div class="stat-sub">Accuracy</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">⭐</div>
      <div class="stat-label">Total XP</div>
      <div class="stat-value c-pink" id="stat-xp">0</div>
      <div class="stat-sub">Experience points</div>
    </div>
  </div>

  <!-- PERFORMANCE CHART -->
  <div class="graph-card">
    <div class="graph-header">
      <div>
        <div class="graph-title">Performance</div>
        <div class="graph-subtitle" id="graphSubtitle">Win rate progression</div>
      </div>
      <div class="graph-controls">
        <label for="graphWindowSelect">Window</label>
        <select id="graphWindowSelect" class="graph-select">
          <option value="10">Last 10</option>
          <option value="20">Last 20</option>
          <option value="30" selected>Last 30</option>
        </select>
      </div>
    </div>
    <div class="graph-wrap">
      <canvas id="perfChart"></canvas>
    </div>
  </div>

  <!-- BUTTONS -->
  <div class="btn-row">
    <button class="back-btn lb" onclick="window.location.href='leaderboards.html'">🏆 Leaderboard</button>
    <button class="back-btn" onclick="window.location.href='play.html'">▶ Play Now</button>
    <button class="back-btn" onclick="window.location.href='profile-edit.html'">✏️ Edit Profile</button>
    <button class="back-btn" onclick="window.location.href='menu.html'">← Menu</button>
  </div>

</div><!-- /.profile-wrapper -->

<script>
const RANK_XP = {
  Copper: 0,
  Bronze: 100,
  Silver: 300,
  Gold: 600,
  Platinum: 1000,
  Diamond: 1500,
  Legend: 2500,
};
const XP_NEXT = {
  Copper: 100,
  Bronze: 300,
  Silver: 600,
  Gold: 1000,
  Platinum: 1500,
  Diamond: 2500,
  Legend: null,
};
const RANK_AVATARS = { Copper:'🟤', Bronze:'🥉', Silver:'🥈', Gold:'🥇', Platinum:'💎', Diamond:'👑', Legend:'🔥', Unranked:'🎯' };
let perfChart = null;
let profileData = null;

function rankFromXp(xp) {
  if (xp >= 2500) return "Legend";
  if (xp >= 1500) return "Diamond";
  if (xp >= 1000) return "Platinum";
  if (xp >= 600) return "Gold";
  if (xp >= 300) return "Silver";
  if (xp >= 100) return "Bronze";
  return "Copper";
}

window.addEventListener("DOMContentLoaded", async () => {
  requireAuth();

  showLoading(true);
  const data = await loadProfile();
  showLoading(false);

  if (!data) return;
  profileData = data;

  /* ── Username & rank ── */
  document.getElementById("username").textContent   = data.username || "Player";

  const xp       = Number(data.xp) || 0;
  const rank = RANK_XP[data.rank] != null ? data.rank : rankFromXp(xp);
  const badge = document.getElementById("rankBadge");
  badge.textContent  = rank;
  badge.className    = `rank-badge ${rank}`;

  /* ── Avatar emoji by rank ── */
/* ── Avatar image or fallback emoji ── */
const avatarImg = document.getElementById("profileAvatarImg");
const avatarFallback = document.getElementById("avatarFallback");

if (data.avatar_url) {
  avatarImg.src = data.avatar_url + "?t=" + Date.now();
  avatarImg.style.display = "block";
  avatarFallback.style.display = "none";
} else {
  avatarImg.style.display = "none";
  avatarFallback.style.display = "flex";
  avatarFallback.textContent = RANK_AVATARS[rank] || "🎯";
}

  /* ── XP bar ── */
  const rankXp   = RANK_XP[rank]  ?? 0;
  const nextXp   = XP_NEXT[rank];
  const pct      = nextXp ? Math.min(100, Math.round(((xp - rankXp) / (nextXp - rankXp)) * 100)) : 100;
  const xpLabel  = nextXp ? `${xp} / ${nextXp} XP` : `${xp} XP  ·  MAX RANK`;
  document.getElementById("xpFill").style.width = pct + "%";
  document.getElementById("xpText").textContent = xpLabel;

  /* ── Header stats ── */
  document.getElementById("hstat-earnings").textContent = (data.earnings ?? 0).toFixed(1);
  document.getElementById("hstat-winrate").textContent  = (data.winrate ?? 0) + "%";

  /* ── Main stat cards ── */
  document.getElementById("stat-played").textContent  = data.handsPlayed ?? 0;
  document.getElementById("stat-won").textContent     = data.handsWon    ?? 0;
  document.getElementById("stat-winrate").textContent = (data.winrate ?? 0) + "%";
  document.getElementById("stat-xp").textContent      = xp;

  /* ── Chart — build a simple visual from what we have ── */
  buildChart(data);

  const graphWindowSelect = document.getElementById("graphWindowSelect");
  if (graphWindowSelect) {
    graphWindowSelect.addEventListener("change", () => {
      buildChart(profileData);
    });
  }
});

function buildChart(data) {
  const scores = Array.isArray(data.recentCompletedScores) ? data.recentCompletedScores : [];
  const graphWindowSelect = document.getElementById("graphWindowSelect");
  const windowSize = Number(graphWindowSelect?.value) || 30;
  const blocks = [];

  for (let i = 0; i < scores.length; i += windowSize) {
    const chunk = scores.slice(i, i + windowSize);
    if (!chunk.length) continue;
    const sum = chunk.reduce((acc, n) => acc + (Number(n) || 0), 0);
    const pct = Math.round((sum / (chunk.length * 10)) * 100);
    blocks.push({
      label: `${i + 1}-${i + chunk.length}`,
      value: Math.max(0, Math.min(100, pct)),
    });
  }

  const labels = blocks.map(b => b.label);
  const values = blocks.map(b => b.value);
  const subtitle = document.getElementById("graphSubtitle");

  if (subtitle) {
    const count = scores.length;
    subtitle.textContent = count > 0
      ? `Completed hands ${count} shown in ${windowSize}-hand blocks`
      : "No completed hands yet";
  }

  if (!values.length) {
    labels.push("No Data");
    values.push(0);
  }

  const ctx = document.getElementById("perfChart");
  if (perfChart) perfChart.destroy();
  perfChart = new Chart(ctx, {
    type: "line",
    data: {
      labels,
      datasets: [{
        data: values,
        borderColor: "#c9a84c",
        backgroundColor: "rgba(201,168,76,0.08)",
        borderWidth: 2,
        pointRadius: 4,
        pointBackgroundColor: "#c9a84c",
        tension: 0.4,
        fill: true
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: {
          min: 0, max: 100,
          ticks: { color: "#8891b0", font: { family: "Rajdhani", size: 11 },
                   callback: v => v + "%" },
          grid: { color: "rgba(255,255,255,0.05)" }
        },
        x: {
          ticks: { color: "#8891b0", font: { family: "Rajdhani", size: 11 } },
          grid: { color: "rgba(255,255,255,0.04)" }
        }
      }
    }
  });
}

function showLoading(s){ document.getElementById("loader").style.display = s ? "block" : "none"; }
</script>
</body>
</html>
