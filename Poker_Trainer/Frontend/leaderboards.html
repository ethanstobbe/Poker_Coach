<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Leaderboard — Poker Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="js/app.js" defer></script>
<style>
:root{
  --accent:#c9a84c; --accent2:#f0d080;
  --bg:#070b0d; --card:#141822;
  --border:#2e3350; --text:#e8e8f0; --muted:#8891b0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Rajdhani',sans-serif;
  background:radial-gradient(circle at center,#0d1f15 0%,#050708 100%);
  min-height:100vh; padding:44px 20px 30px; color:var(--text);
}
body::before{
  content:""; position:fixed; inset:0; z-index:-1;
  background:
    radial-gradient(circle at 20% 30%,rgba(201,168,76,0.15),transparent 40%),
    radial-gradient(circle at 80% 70%,rgba(0,255,150,0.08),transparent 40%);
}

/* TOP NAV */
.top-nav{
  position:fixed; top:0; left:0; right:0; height:44px; z-index:100;
  background:linear-gradient(180deg,#1a0e04,#0e0800);
  border-bottom:1px solid rgba(201,168,76,0.25);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px;
}
.nav-title{
  font-family:'Bebas Neue'; font-size:15px; letter-spacing:4px;
  color:var(--accent); text-shadow:0 0 10px rgba(201,168,76,0.4);
}
.nav-btns{display:flex;gap:8px;}
.nav-btn{
  font-family:'Rajdhani'; font-size:11px; font-weight:700;
  letter-spacing:1px; text-transform:uppercase;
  padding:5px 14px; border-radius:4px; cursor:pointer;
  border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.05); color:#ccc; transition:all .15s;
}
.nav-btn:hover{background:rgba(201,168,76,0.15);border-color:var(--accent);color:var(--accent2);}

/* LOADER / TOAST */
#loader{
  display:none; position:fixed; top:54px; left:50%; transform:translateX(-50%);
  z-index:200; background:rgba(0,0,0,0.82); border:1px solid rgba(255,255,255,0.1);
  border-radius:999px; padding:7px 18px;
  color:rgba(255,255,255,0.85); font-size:11px; letter-spacing:1.5px; text-transform:uppercase;
}
#toast{
  display:none; position:fixed; top:54px; left:50%; transform:translateX(-50%);
  z-index:201; padding:9px 20px; border-radius:8px;
  font-family:'Rajdhani'; font-size:13px; font-weight:700; letter-spacing:.5px;
  white-space:nowrap; pointer-events:none;
}
.toast-error  {background:#5a1010;border:1px solid #cc2222;color:#ffaaaa;}
.toast-success{background:#0e3a1a;border:1px solid #2d8a3a;color:#90ffaa;}

/* WRAPPER */
.lb-wrapper{max-width:880px;margin:auto;display:flex;flex-direction:column;gap:20px;}

/* ── HEADER ── */
.lb-header{
  display:flex; justify-content:space-between; align-items:center;
  padding:26px 32px;
  background:rgba(14,18,28,0.92);
  border:1px solid rgba(201,168,76,0.25); border-radius:18px;
  backdrop-filter:blur(10px);
  box-shadow:0 0 40px rgba(0,0,0,0.7),0 0 20px rgba(201,168,76,0.06);
  position:relative; overflow:hidden;
}
.lb-header::before{
  content:''; position:absolute; top:-60px; right:-60px;
  width:260px; height:260px; border-radius:50%;
  background:radial-gradient(circle,rgba(201,168,76,0.07),transparent 70%);
  pointer-events:none;
}
.lb-header h1{
  font-family:'Bebas Neue'; font-size:52px; letter-spacing:4px;
  color:var(--accent); text-shadow:0 0 14px rgba(201,168,76,0.5);
  line-height:1;
}
.lb-header-sub{font-size:11px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:4px;}
.lb-total-wrap{text-align:right;}
.lb-total-num{font-family:'Bebas Neue';font-size:40px;letter-spacing:2px;color:var(--accent2);}
.lb-total-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);}

/* ── PODIUM ── */
.podium{
  display:flex; justify-content:center; align-items:flex-end;
  gap:16px; padding:10px 0 4px;
}
.podium-seat{text-align:center;transition:.2s;cursor:default;}
.podium-seat:hover{transform:translateY(-6px);}

.podium-place-1 .podium-block{ height:90px; }
.podium-place-2 .podium-block{ height:70px; }
.podium-place-3 .podium-block{ height:54px; }

.podium-avatar{
  width:58px; height:58px; border-radius:50%;
  background:linear-gradient(135deg,#2b3246,#12141d);
  border:2px solid var(--accent);
  display:flex; align-items:center; justify-content:center;
  font-size:26px; margin:0 auto 6px;
  box-shadow:0 0 16px rgba(201,168,76,0.35);
}
.podium-place-1 .podium-avatar{
  width:68px; height:68px; font-size:32px;
  border-color:#ffd700; box-shadow:0 0 22px rgba(255,215,0,0.5);
}
.podium-name{font-weight:700;letter-spacing:1px;font-size:13px;margin-bottom:4px;}
.podium-xp{font-size:11px;color:var(--muted);margin-bottom:6px;}
.podium-block{
  border-radius:10px 10px 0 0;
  display:flex; align-items:center; justify-content:center;
  font-family:'Bebas Neue'; font-size:20px; letter-spacing:2px;
  padding:0 22px; min-width:80px;
  box-shadow:0 -4px 18px rgba(0,0,0,0.5);
}
.podium-place-1 .podium-block{background:linear-gradient(180deg,#3a2c00,#201800);color:#ffd700;border:1px solid rgba(255,215,0,0.3);border-bottom:none;}
.podium-place-2 .podium-block{background:linear-gradient(180deg,#252525,#141414);color:#c0c0c0;border:1px solid rgba(192,192,192,0.2);border-bottom:none;}
.podium-place-3 .podium-block{background:linear-gradient(180deg,#2a1800,#180e00);color:#cd7f32;border:1px solid rgba(205,127,50,0.2);border-bottom:none;}

/* ── TABLE ── */
.lb-table-card{
  background:rgba(14,18,28,0.92);
  border:1px solid var(--border); border-radius:16px;
  overflow:hidden;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}
.lb-header-row{
  display:grid; grid-template-columns:54px 1fr 130px 100px;
  padding:12px 20px;
  font-size:9px; letter-spacing:2px; text-transform:uppercase;
  color:var(--muted); background:rgba(255,255,255,0.025);
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.lb-row{
  display:grid; grid-template-columns:54px 1fr 130px 100px;
  padding:13px 20px; align-items:center;
  border-bottom:1px solid rgba(255,255,255,0.04);
  transition:.15s; font-size:13px;
}
.lb-row:last-child{border-bottom:none;}
.lb-row:hover{background:rgba(255,255,255,0.04);}
.lb-row.top-3{background:rgba(201,168,76,0.04);}
.lb-row.is-me{background:rgba(201,168,76,0.08);border-left:3px solid var(--accent);}

.pos-num{
  font-family:'Bebas Neue'; font-size:18px; letter-spacing:1px;
  color:var(--muted);
}
.pos-num.gold{color:#ffd700;}
.pos-num.silver{color:#c0c0c0;}
.pos-num.bronze{color:#cd7f32;}

.lb-player{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:.5px;}
.lb-avatar{
  width:32px; height:32px; border-radius:50%; flex-shrink:0;
  background:linear-gradient(135deg,#2b3246,#12141d);
  border:1px solid rgba(201,168,76,0.2);
  display:flex; align-items:center; justify-content:center;
  font-size:15px;
}
.lb-name{flex:1;}
.lb-me-tag{
  font-size:9px; letter-spacing:1px; text-transform:uppercase;
  background:rgba(201,168,76,0.15); color:var(--accent2);
  border:1px solid rgba(201,168,76,0.3); border-radius:10px;
  padding:1px 7px; margin-left:6px;
}

.rank-pill{
  display:inline-block; padding:3px 10px; border-radius:20px;
  font-size:10px; font-weight:700; letter-spacing:1px; text-transform:uppercase; border:1px solid;
}
.rank-pill.Bronze   {color:#cd7f32;border-color:#cd7f32;background:rgba(205,127,50,0.10);}
.rank-pill.Silver   {color:#c0c0c0;border-color:#c0c0c0;background:rgba(192,192,192,0.10);}
.rank-pill.Gold     {color:#ffd700;border-color:#ffd700;background:rgba(255,215,0,0.12);}
.rank-pill.Platinum {color:#a0d8ef;border-color:#a0d8ef;background:rgba(160,216,239,0.12);}
.rank-pill.Diamond  {color:#b9f2ff;border-color:#b9f2ff;background:rgba(185,242,255,0.16);}
.rank-pill.Unranked {color:#888;border-color:#555;background:rgba(100,100,100,0.10);}

.xp-cell{font-family:'Bebas Neue';font-size:17px;letter-spacing:1px;color:var(--accent2);}

/* empty / loading */
.empty-state{
  text-align:center; padding:36px 20px;
  color:var(--muted); font-size:12px; letter-spacing:1px;
}

/* BUTTON */
.btn-row{display:flex;gap:12px;}
.back-btn{
  flex:1; padding:13px; border-radius:10px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.05); color:var(--text);
  font-family:'Rajdhani'; font-weight:700; font-size:13px; letter-spacing:2px;
  cursor:pointer; transition:.2s; text-transform:uppercase;
}
.back-btn:hover{background:var(--accent);color:#111;box-shadow:0 8px 25px rgba(201,168,76,0.4);}
.back-btn.profile{background:rgba(201,168,76,0.06);border-color:rgba(201,168,76,0.3);color:var(--accent2);}
.back-btn.profile:hover{background:rgba(201,168,76,0.2);}
</style>
</head>
<body>

<div id="loader">Loading…</div>
<div id="toast" class="toast"></div>

<!-- TOP NAV -->
<nav class="top-nav">
  <div class="nav-title">Poker Trainer</div>
  <div class="nav-btns">
    <button class="nav-btn" onclick="window.location.href='menu.html'">← Menu</button>
    <button class="nav-btn" onclick="window.location.href='profile.html'">👤 Profile</button>
    <button class="nav-btn" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="lb-wrapper">

  <!-- HEADER -->
  <div class="lb-header">
    <div>
      <h1>Leaderboard</h1>
      <div class="lb-header-sub">Top Poker Trainers — Ranked by XP</div>
    </div>
    <div class="lb-total-wrap">
      <div class="lb-total-num" id="totalPlayers">—</div>
      <div class="lb-total-label">Players Ranked</div>
    </div>
  </div>

  <!-- PODIUM (top 3) -->
  <div class="podium" id="podium"></div>

  <!-- FULL TABLE -->
  <div class="lb-table-card">
    <div class="lb-header-row">
      <div>#</div>
      <div>Player</div>
      <div>Rank</div>
      <div>XP</div>
    </div>
    <div id="lbRows">
      <div class="empty-state">Loading leaderboard…</div>
    </div>
  </div>

  <!-- BUTTONS -->
  <div class="btn-row">
    <button class="back-btn profile" onclick="window.location.href='profile.html'">👤 My Profile</button>
    <button class="back-btn" onclick="window.location.href='menu.html'">← Menu</button>
  </div>

</div>

<script>
const RANK_AVATARS = { Bronze:'🥉', Silver:'🥈', Gold:'🥇', Platinum:'💎', Diamond:'👑', Unranked:'🎯' };
const POS_EMOJI    = ['🥇','🥈','🥉'];

/* Get current user's username for "YOU" highlight */
let myUsername = null;

window.addEventListener("DOMContentLoaded", async () => {
  requireAuth();

  /* Try to get own username silently */
  try {
    const me = await loadProfile();
    if (me) myUsername = me.username;
  } catch(_){}

  showLoading(true);
  await loadLeaderboard();
  showLoading(false);
});

/* Override loadLeaderboard from app.js with our richer version */
async function loadLeaderboard() {
  try {
    const res  = await fetch(`${API_BASE}/leaderboards`);
    const data = await res.json();
    if (!res.ok) { showError(data.error || "Failed to load"); return; }

    /* Header count */
    document.getElementById("totalPlayers").textContent = data.length;

    /* Build podium (top 3) */
    buildPodium(data.slice(0, 3));

    /* Build rows */
    buildRows(data);

  } catch(err) {
    showError(err.message);
    document.getElementById("lbRows").innerHTML =
      '<div class="empty-state">Failed to load leaderboard.</div>';
  }
}

function buildPodium(top) {
  const ORDER = [1, 0, 2]; /* visual order: 2nd, 1st, 3rd */
  const podium = document.getElementById("podium");
  podium.innerHTML = "";

  ORDER.forEach(idx => {
    const p = top[idx];
    if (!p) return;
    const place = idx + 1;
    const seat = document.createElement("div");
    seat.className = `podium-seat podium-place-${place}`;
    seat.innerHTML = `
      <div class="podium-avatar">${POS_EMOJI[idx] || RANK_AVATARS[p.rank] || "👤"}</div>
      <div class="podium-name">${p.username}</div>
      <div class="podium-xp">${p.xp} XP</div>
      <div class="podium-block">#${place}</div>
    `;
    podium.appendChild(seat);
  });
}

function buildRows(players) {
  const rows = document.getElementById("lbRows");
  rows.innerHTML = "";

  if (!players.length) {
    rows.innerHTML = '<div class="empty-state">No players yet. Be the first!</div>';
    return;
  }

  players.forEach((p, i) => {
    const isMe  = myUsername && p.username === myUsername;
    const isTop = i < 3;
    const rank  = p.rank || "Unranked";

    const posClass = i === 0 ? "gold" : i === 1 ? "silver" : i === 2 ? "bronze" : "";
    const rowClass = isMe ? "lb-row is-me" : isTop ? "lb-row top-3" : "lb-row";

    const row = document.createElement("div");
    row.className = rowClass;
    row.innerHTML = `
      <div class="pos-num ${posClass}">${i < 3 ? POS_EMOJI[i] : i + 1}</div>
      <div class="lb-player">
        <div class="lb-avatar">${RANK_AVATARS[rank] || "👤"}</div>
        <div class="lb-name">${p.username}${isMe ? '<span class="lb-me-tag">YOU</span>' : ''}</div>
      </div>
      <div><span class="rank-pill ${rank}">${rank}</span></div>
      <div class="xp-cell">${p.xp}</div>
    `;
    rows.appendChild(row);
  });
}

function showLoading(s){ document.getElementById("loader").style.display = s ? "block" : "none"; }
</script>
</body>
</html>
