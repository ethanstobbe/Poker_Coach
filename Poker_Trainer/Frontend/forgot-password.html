<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Poker Trainer — Password Recovery</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Rajdhani:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet"/>

<style>
  :root{
    --bg:#050302;--gold:#c9a84c;--gold2:#f0d080;--gold3:#fff2b8;
    --panel:rgba(8,5,2,0.92);--border:rgba(201,168,76,0.2);
    --text:#ede8e0;--muted:rgba(255,255,255,0.32);
  }

  *{box-sizing:border-box;margin:0;padding:0;}

  html,body{
    width:100vw;height:100vh;overflow:hidden;
    background:var(--bg);
    font-family:'Rajdhani',sans-serif;
    color:var(--text);
  }

  /* Background layers */
  .bg-base{
    position:fixed;inset:0;z-index:0;
    background:
      radial-gradient(ellipse 120% 90% at 50% 50%, #1c0e04 0%, #0a0502 38%, #030200 70%, #020101 100%);
  }

  .bg-glow{
    position:fixed;inset:0;z-index:1;pointer-events:none;
    background:
      radial-gradient(ellipse 50% 40% at 50% 45%, rgba(201,168,76,0.09) 0%, transparent 60%),
      radial-gradient(ellipse 80% 60% at 20% 80%, rgba(20,80,30,0.06) 0%, transparent 55%),
      radial-gradient(ellipse 60% 50% at 80% 20%, rgba(30,20,60,0.06) 0%, transparent 55%);
  }

  .bg-grid{
    position:fixed;inset:0;z-index:2;pointer-events:none;
    background-image:
      linear-gradient(rgba(201,168,76,0.025) 1px,transparent 1px),
      linear-gradient(90deg,rgba(201,168,76,0.025) 1px,transparent 1px);
    background-size:56px 56px;
  }

  .bg-vig{
    position:fixed;inset:0;z-index:3;pointer-events:none;
    background:radial-gradient(ellipse 100% 100% at 50% 50%,transparent 38%,rgba(0,0,0,0.72) 100%);
  }

  /* Layout */
  .page{
    position:relative;
    z-index:10;
    width:100vw;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  /* Panel */
  .panel{
    position:relative;
    width:400px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:2px;
    padding:44px 38px 38px;
    backdrop-filter:blur(28px);
    box-shadow:
      0 60px 120px rgba(0,0,0,0.97),
      0 0 0 1px rgba(255,255,255,0.025),
      inset 0 1px 0 rgba(255,255,255,0.05);
    animation:panelIn .6s cubic-bezier(.34,1.56,.64,1) both;
  }

  @keyframes panelIn{
    from{transform:translateY(22px) scale(.96);opacity:0;}
    to{transform:none;opacity:1;}
  }

  .panel::before{
    content:'';
    position:absolute;
    top:-1px;
    left:15%;
    right:15%;
    height:2px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
    border-radius:2px;
    opacity:0.7;
  }

  /* Logo */
  .logo{text-align:center;margin-bottom:36px;}

  .logo-suits{
    font-size:15px;
    letter-spacing:14px;
    color:rgba(201,168,76,0.42);
    margin-bottom:12px;
  }

  .logo-wordmark{
    font-family:'Cinzel',serif;
    font-size:28px;
    font-weight:700;
    letter-spacing:7px;
    text-transform:uppercase;
    background:linear-gradient(180deg,var(--gold3) 0%,var(--gold2) 40%,var(--gold) 100%);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    filter:drop-shadow(0 0 18px rgba(201,168,76,0.4));
    margin-bottom:6px;
  }

  .logo-tagline{
    font-size:9px;
    letter-spacing:5px;
    text-transform:uppercase;
    color:var(--muted);
  }

  /* Separator */
  .sep{display:flex;align-items:center;gap:10px;margin-bottom:26px;}

  .sep-line{flex:1;height:1px;background:rgba(201,168,76,0.1);}

  .sep-diamond{
    width:5px;height:5px;
    background:var(--gold);
    transform:rotate(45deg);
    flex-shrink:0;
    box-shadow:0 0 5px rgba(201,168,76,0.7);
  }

  /* Form */
  .form{display:flex;flex-direction:column;gap:10px;}

  .field{position:relative;}

  .field-label{
    font-size:7px;
    letter-spacing:2.5px;
    text-transform:uppercase;
    color:var(--muted);
    display:block;
    margin-bottom:5px;
  }

  .field input{
    width:100%;
    padding:11px 14px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:2px;
    color:var(--text);
    font-family:'Rajdhani',sans-serif;
    font-size:14px;
    font-weight:600;
    outline:none;
    transition:all .18s;
  }

  .field input::placeholder{
    color:rgba(255,255,255,0.2);
    font-weight:400;
  }

  .field input:focus{
    background:rgba(255,255,255,0.06);
    border-color:rgba(201,168,76,0.45);
    box-shadow:0 0 0 3px rgba(201,168,76,0.08);
  }

  /* Button */
  .btn-submit{
    margin-top:6px;width:100%;padding:13px;
    background:linear-gradient(180deg,rgba(185,145,52,0.95),rgba(148,110,30,0.95));
    border:1px solid rgba(201,168,76,0.5);
    border-radius:2px;
    color:#0a0600;
    font-family:'Rajdhani',sans-serif;
    font-size:12px;
    font-weight:700;
    letter-spacing:4px;
    text-transform:uppercase;
    cursor:pointer;
    transition:all .18s;
    position:relative;
    overflow:hidden;
  }

  .btn-submit::before{
    content:'';
    position:absolute;
    inset:0;
    background:linear-gradient(180deg,rgba(255,255,255,0.12),transparent);
    pointer-events:none;
  }

  .btn-submit:hover{
    background:linear-gradient(180deg,rgba(210,168,64,0.98),rgba(168,126,38,0.98));
    box-shadow:0 0 24px rgba(201,168,76,0.45),0 4px 16px rgba(0,0,0,0.5);
    transform:translateY(-1px);
  }

  .btn-submit:active{
    transform:translateY(0);
    box-shadow:0 0 12px rgba(201,168,76,0.3);
  }

  /* Error */
  .err{
    margin-top:8px;
    font-size:11px;
    letter-spacing:.5px;
    color:#ff8888;
    display:none;
    text-align:center;
    padding:7px 10px;
    background:rgba(180,20,20,0.1);
    border:1px solid rgba(180,20,20,0.25);
    border-radius:2px;
  }

  /* Auth links */
  .auth-links{
    margin-top:10px;
    text-align:center;
    font-size:11px;
    letter-spacing:.6px;
    color:var(--muted);
  }

  .auth-links a{
    color:var(--gold);
    text-decoration:none;
    margin:0 6px;
    transition:all .15s;
  }

  .auth-links a:hover{
    text-decoration:underline;
    color:var(--gold3);
  }
    
</style>
</head>

<body>

<div class="bg-base"></div>
<div class="bg-glow"></div>
<div class="bg-grid"></div>
<div class="bg-vig"></div>

<div class="page">

<div class="panel">

<div class="logo">
<div class="logo-suits">♠ ♥ ♦ ♣</div>
<div class="logo-wordmark">Poker Trainer</div>
<div class="logo-tagline">Recover your password</div>
</div>

<div class="sep">
<div class="sep-line"></div>
<div class="sep-diamond"></div>
<div class="sep-line"></div>
</div>

<div class="form">

<div class="field">
<label class="field-label">Email address</label>
<input id="email" type="email" placeholder="you@example.com"/>
</div>

<button class="btn-submit" onclick="handlePassRecovery()">Send Recovery Email</button>

<div class="auth-links">
<a href="/">Back to sign in</a>
</div>

<div id="forgotPassError" class="err"></div>

</div>

</div>
</div>

<script>

async function handlePassRecovery() {
  const email = document.getElementById("email").value.trim();
  const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

   if (!email || !emailRegex.test(email)) {
    showError("Please enter a valid email address.");
    return;
  }

  const errEl = document.getElementById("forgotPassError");
  if (errEl) errEl.style.display = "none";

  try {
    // resetPassword is in app.js
    const result = resetPassword(email);
    if(result && result.catch) result.catch(err => showErr("Connection error. Is the server running?"));
  } catch (e) {
    showError("Connection error. Is the server running?");
  }
}

function showError(msg){
  const el = document.getElementById("forgotPassError");
  if(el){ el.textContent = msg; el.style.display = "block"; }
}
function showErr(msg){ showError(msg); }

</script>
<script src="js/app.js"></script>

</body>
</html>
