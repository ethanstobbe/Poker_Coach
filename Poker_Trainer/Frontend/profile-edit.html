<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Edit Profile — Poker Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="js/app.js" defer></script>
<style>
:root{
  --accent:#c9a84c; --accent2:#f0d080;
  --bg:#070b0d; --card:#141822;
  --border:#2e3350; --text:#e8e8f0; --muted:#8891b0;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Rajdhani',sans-serif;
  background:radial-gradient(circle at center,#0d1f15 0%,#050708 100%);
  min-height:100vh; padding:60px 20px 40px; color:var(--text);
}
body::before{
  content:""; position:fixed; inset:0; z-index:-1;
  background:
    radial-gradient(circle at 20% 30%,rgba(201,168,76,0.15),transparent 40%),
    radial-gradient(circle at 80% 70%,rgba(0,255,150,0.08),transparent 40%);
}
.top-nav{
  position:fixed; top:0; left:0; right:0; height:44px; z-index:100;
  background:linear-gradient(180deg,#1a0e04,#0e0800);
  border-bottom:1px solid rgba(201,168,76,0.25);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px;
}
.nav-title{
  font-family:'Bebas Neue'; font-size:15px; letter-spacing:4px;
  color:var(--accent); text-shadow:0 0 10px rgba(201,168,76,0.4);
}
.nav-btns{display:flex;gap:8px;}
.nav-btn{
  font-family:'Rajdhani'; font-size:11px; font-weight:700;
  letter-spacing:1px; text-transform:uppercase;
  padding:5px 14px; border-radius:4px; cursor:pointer;
  border:1px solid rgba(255,255,255,0.12);
  background:rgba(255,255,255,0.05); color:#ccc; transition:all .15s;
}
.nav-btn:hover{background:rgba(201,168,76,0.15);border-color:var(--accent);color:var(--accent2);}
#toast{
  display:none; position:fixed; top:54px; left:50%; transform:translateX(-50%);
  z-index:201; padding:9px 20px; border-radius:8px;
  font-family:'Rajdhani'; font-size:13px; font-weight:700; letter-spacing:.5px;
  white-space:nowrap; pointer-events:none;
}
.toast-error  {background:#5a1010;border:1px solid #cc2222;color:#ffaaaa;}
.toast-success{background:#0e3a1a;border:1px solid #2d8a3a;color:#90ffaa;}
.wrapper{max-width:560px;margin:auto;display:flex;flex-direction:column;gap:20px;}
.card{
  background:rgba(14,18,28,0.92);
  border:1px solid rgba(201,168,76,0.22); border-radius:18px;
  padding:30px 32px; backdrop-filter:blur(10px);
  box-shadow:0 0 40px rgba(0,0,0,0.7);
}
.card-title{
  font-family:'Bebas Neue'; font-size:22px; letter-spacing:3px;
  color:var(--accent2); margin-bottom:6px;
}
.card-sub{font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:24px;}
.avatar-preview-wrap{display:flex;justify-content:center;margin-bottom:24px;}
.avatar-preview{
  width:100px;height:100px;border-radius:50%;
  border:2px solid var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-size:52px;
  background:radial-gradient(circle at 35% 30%,#2a3f2a,#0d1a10);
  box-shadow:0 0 22px rgba(201,168,76,0.4);
  overflow:hidden; transition:all .3s;
}
.avatar-preview img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.premade-label{
  font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);margin-bottom:12px;
}
.premade-grid{
  display:grid;grid-template-columns:repeat(6,1fr);gap:10px;
  margin-bottom:24px;
}
.premade-btn{
  width:100%;aspect-ratio:1;border-radius:50%;
  background:rgba(255,255,255,0.04);
  border:2px solid rgba(255,255,255,0.08);
  font-size:28px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all .18s;
}
.premade-btn:hover{border-color:var(--accent);background:rgba(201,168,76,0.1);transform:scale(1.08);}
.premade-btn.selected{
  border-color:var(--accent);background:rgba(201,168,76,0.18);
  box-shadow:0 0 14px rgba(201,168,76,0.4);
}
.divider{
  display:flex;align-items:center;gap:10px;margin:4px 0 20px;
  color:var(--muted);font-size:10px;letter-spacing:2px;text-transform:uppercase;
}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.08);}
.upload-zone{
  border:2px dashed rgba(201,168,76,0.25);border-radius:12px;
  padding:20px;text-align:center;cursor:pointer;
  transition:all .18s;margin-bottom:8px;position:relative;
}
.upload-zone:hover{border-color:rgba(201,168,76,0.55);background:rgba(201,168,76,0.04);}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.upload-icon{font-size:28px;margin-bottom:6px;}
.upload-text{font-size:12px;color:var(--muted);letter-spacing:.5px;}
.upload-text span{color:var(--accent);font-weight:700;}
.field{margin-bottom:16px;}
.field-label{
  font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:var(--muted);display:block;margin-bottom:6px;
}
.field input{
  width:100%;padding:11px 14px;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(255,255,255,0.1);border-radius:8px;
  color:var(--text);font-family:'Rajdhani';font-size:14px;font-weight:600;
  outline:none;transition:all .18s;
}
.field input:focus{
  background:rgba(255,255,255,0.06);
  border-color:rgba(201,168,76,0.45);
  box-shadow:0 0 0 3px rgba(201,168,76,0.08);
}
.btn{
  width:100%;padding:13px;border-radius:10px;
  border:1px solid rgba(201,168,76,0.4);
  background:linear-gradient(180deg,rgba(185,145,52,0.9),rgba(148,110,30,0.9));
  color:#0a0600;font-family:'Rajdhani';font-size:12px;font-weight:700;
  letter-spacing:3px;text-transform:uppercase;cursor:pointer;transition:all .18s;
}
.btn:hover{
  background:linear-gradient(180deg,rgba(210,168,64,0.98),rgba(168,126,38,0.98));
  box-shadow:0 0 20px rgba(201,168,76,0.4);transform:translateY(-1px);
}
.btn:disabled{opacity:0.4;cursor:not-allowed;transform:none;}
.btn-ghost{
  width:100%;padding:11px;border-radius:10px;
  border:1px solid var(--border);
  background:rgba(255,255,255,0.04); color:var(--text);
  font-family:'Rajdhani';font-size:12px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;transition:all .18s;margin-top:10px;
}
.btn-ghost:hover{background:rgba(255,255,255,0.08);border-color:rgba(255,255,255,0.2);}
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<nav class="top-nav">
  <div class="nav-title">Poker Trainer</div>
  <div class="nav-btns">
    <button class="nav-btn" onclick="window.location.href='profile.html'">← Profile</button>
    <button class="nav-btn" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="wrapper">

  <div class="card">
    <div class="card-title">Profile Picture</div>
    <div class="card-sub">Choose a premade avatar or upload your own</div>

    <div class="avatar-preview-wrap">
      <div class="avatar-preview" id="avatarPreview">🎯</div>
    </div>

    <div class="premade-label">Choose a premade avatar</div>
    <div class="premade-grid" id="premadeGrid"></div>

    <div class="divider">or upload your own</div>

    <div class="upload-zone">
      <input type="file" id="avatarFile" accept="image/*" onchange="handleFileSelect(event)"/>
      <div class="upload-icon">📁</div>
      <div class="upload-text">Drag & drop or <span>browse</span> — JPG, PNG, GIF up to 5MB</div>
    </div>

    <button class="btn" id="saveAvatarBtn" onclick="saveAvatar()" style="margin-top:16px;">
      Save Avatar
    </button>
  </div>

  <div class="card">
    <div class="card-title">Change Username</div>
    <div class="card-sub">2–24 characters, must be unique</div>

    <div class="field">
      <label class="field-label">New Username</label>
      <input type="text" id="newUsername" placeholder="Enter new username" maxlength="24"
             onkeydown="if(event.key==='Enter') saveUsername()"/>
    </div>

    <button class="btn" id="saveUsernameBtn" onclick="saveUsername()">
      Save Username
    </button>

    <button class="btn-ghost" onclick="window.location.href='profile.html'">
      ← Back to Profile
    </button>
  </div>

</div>

<script>
const API_BASE = "http://localhost:3000/api";

const PREMADE = [
  "🎯","👑","🤠","😎","🦊","🐺",
  "🦁","🐻","🎭","🃏","♠️","♥️",
  "💎","🔥","⚡","🌟","🏆","🎲"
];

let selectedPremade = null;
let selectedFile    = null;

function buildPremadeGrid() {
  const grid = document.getElementById("premadeGrid");
  PREMADE.forEach(emoji => {
    const btn = document.createElement("button");
    btn.className   = "premade-btn";
    btn.textContent = emoji;
    btn.onclick     = () => selectPremade(emoji);
    grid.appendChild(btn);
  });
}

function selectPremade(emoji) {
  selectedPremade = emoji;
  selectedFile    = null;
  document.querySelectorAll(".premade-btn").forEach(b => {
    b.classList.toggle("selected", b.textContent === emoji);
  });
  document.getElementById("avatarPreview").innerHTML = emoji;
}

function handleFileSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  selectedFile    = file;
  selectedPremade = null;
  document.querySelectorAll(".premade-btn").forEach(b => b.classList.remove("selected"));
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById("avatarPreview").innerHTML = `<img src="${e.target.result}" alt="preview"/>`;
  };
  reader.readAsDataURL(file);
}

async function saveAvatar() {
  const btn = document.getElementById("saveAvatarBtn");
  if (!selectedPremade && !selectedFile) {
    showToast("Please choose or upload an avatar first", "error");
    return;
  }
  btn.disabled    = true;
  btn.textContent = "SAVING…";

  try {
    const token = localStorage.getItem("access_token");

    if (selectedFile) {
      const formData = new FormData();
      formData.append("avatar", selectedFile);
      const res  = await fetch(`${API_BASE}/profile/avatar`, {
        method: "POST",
        headers: { Authorization: `Bearer ${token}` },
        body: formData,
      });
      const data = await res.json();
      if (!res.ok) { showToast(data.error || "Upload failed", "error"); return; }
      showToast("Avatar updated! ✓", "success");

    } else if (selectedPremade) {
      const canvas = document.createElement("canvas");
      canvas.width = canvas.height = 256;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#141822";
      ctx.fillRect(0, 0, 256, 256);
      ctx.font          = "160px serif";
      ctx.textAlign     = "center";
      ctx.textBaseline  = "middle";
      ctx.fillText(selectedPremade, 128, 140);

      canvas.toBlob(async (blob) => {
        const formData = new FormData();
        formData.append("avatar", blob, "avatar.png");
        const res  = await fetch(`${API_BASE}/profile/avatar`, {
          method: "POST",
          headers: { Authorization: `Bearer ${token}` },
          body: formData,
        });
        const data = await res.json();
        btn.disabled    = false;
        btn.textContent = "SAVE AVATAR";
        if (!res.ok) { showToast(data.error || "Upload failed", "error"); return; }
        showToast("Avatar updated! ✓", "success");
      }, "image/png");
      return;
    }
  } catch (err) {
    showToast("Connection error — is the server running?", "error");
  }

  btn.disabled    = false;
  btn.textContent = "SAVE AVATAR";
}

async function saveUsername() {
  const val = document.getElementById("newUsername").value.trim();
  const btn = document.getElementById("saveUsernameBtn");
  if (!val || val.length < 2) { showToast("Username must be at least 2 characters", "error"); return; }
  btn.disabled    = true;
  btn.textContent = "SAVING…";

  try {
    const token = localStorage.getItem("access_token");
    const res   = await fetch(`${API_BASE}/profile/username`, {
      method:  "PATCH",
      headers: { "Content-Type": "application/json", Authorization: `Bearer ${token}` },
      body:    JSON.stringify({ username: val }),
    });
    const data = await res.json();
    if (!res.ok) {
      showToast(data.error || "Failed to update username", "error");
    } else {
      showToast(`Username changed to "${data.username}" ✓`, "success");
      document.getElementById("newUsername").value = "";
    }
  } catch (err) {
    showToast("Connection error — is the server running?", "error");
  }

  btn.disabled    = false;
  btn.textContent = "SAVE USERNAME";
}

function showToast(msg, type = "info") {
  const el = document.getElementById("toast");
  el.textContent   = msg;
  el.className     = `toast toast-${type}`;
  el.style.display = "block";
  setTimeout(() => { el.style.display = "none"; }, 3500);
}

window.addEventListener("DOMContentLoaded", () => {
  if (typeof requireAuth === "function") requireAuth();
  buildPremadeGrid();
  loadCurrentAvatar();
});

async function loadCurrentAvatar() {
  try {
    const token = localStorage.getItem("access_token");
    const res   = await fetch(`${API_BASE}/users/me`, {
      headers: { Authorization: `Bearer ${token}` }
    });
    if (!res.ok) return;
    const data = await res.json();
    if (data.username) document.getElementById("newUsername").placeholder = data.username;
    if (data.avatarUrl) {
      document.getElementById("avatarPreview").innerHTML = `<img src="${data.avatarUrl}" alt="avatar"/>`;
    }
  } catch (_) {}
}
</script>
</body>
</html>
